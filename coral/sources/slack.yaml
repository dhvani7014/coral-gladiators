name: slack
version: 0.1.0
dsl_version: 3
backend: jsonl

test_queries:
  - SELECT * FROM slack.slack_logs LIMIT 1

tables:
  - name: slack_logs
    description: Slack/chat message logs
    source:
      location: file:///Users/parthachakraborty/Developer/NEW/coral/coral-gladiators/coral/data/
      glob: "slack_logs.jsonl"
    columns:
      - name: message_id
        type: Utf8
      - name: user_id
        type: Utf8
      - name: user_name
        type: Utf8
      - name: channel
        type: Utf8
      - name: message
        type: Utf8
      - name: timestamp
        type: Utf8
