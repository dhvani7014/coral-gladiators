name: sentineldb
version: 0.1.0
dsl_version: 3
backend: jsonl

test_queries:
  - SELECT * FROM sentineldb.transactions LIMIT 1
  - SELECT * FROM sentineldb.sanctions LIMIT 1

tables:
  - name: transactions
    description: Financial transactions with fraud risk scores
    source:
      location: file:///Users/parthachakraborty/Developer/NEW/coral/coral-gladiators/coral/data/
      glob: "transactions.jsonl"
    columns:
      - name: transaction_id
        type: Utf8
      - name: sender
        type: Utf8
      - name: receiver
        type: Utf8
      - name: amount
        type: Float64
      - name: timestamp
        type: Utf8
      - name: location
        type: Utf8
      - name: risk_score
        type: Int64
      - name: flags
        type: Utf8

  - name: sanctions
    description: Sanctioned entities list
    source:
      location: file:///Users/parthachakraborty/Developer/NEW/coral/coral-gladiators/coral/data/
      glob: "sanctions.jsonl"
    columns:
      - name: id
        type: Int64
      - name: entity_name
        type: Utf8
      - name: country
        type: Utf8
      - name: sanction_type
        type: Utf8
      - name: listed_date
        type: Utf8
      - name: source
        type: Utf8

  - name: emails
    description: Employee email communications
    source:
      location: file:///Users/parthachakraborty/Developer/NEW/coral/coral-gladiators/coral/data/
      glob: "emails.jsonl"
    columns:
      - name: email_id
        type: Utf8
      - name: sender
        type: Utf8
      - name: receiver
        type: Utf8
      - name: subject
        type: Utf8
      - name: body
        type: Utf8
      - name: timestamp
        type: Utf8
      - name: employee_id
        type: Utf8

  - name: slack_logs
    description: Slack/chat message logs
    source:
      location: file:///Users/parthachakraborty/Developer/NEW/coral/coral-gladiators/coral/data/
      glob: "slack_logs.jsonl"
    columns:
      - name: message_id
        type: Utf8
      - name: user_id
        type: Utf8
      - name: user_name
        type: Utf8
      - name: channel
        type: Utf8
      - name: message
        type: Utf8
      - name: timestamp
        type: Utf8
